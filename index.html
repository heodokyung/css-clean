<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS 구조 유지 고급 변환기</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; background: #111; color: #eee; }
h1 { font-size: 20px; margin-bottom: 10px; }
textarea { width: 100%; height: 240px; margin-bottom: 10px; padding: 10px; border-radius: 6px; border: 1px solid #333; background: #1e1e1e; color: #eee; }
button { padding: 10px 16px; margin-right: 8px; border: none; border-radius: 6px; cursor: pointer; }
#formatBtn { background: #4caf50; color: white; }
#copyBtn { background: #2196f3; color: white; }
</style>
</head>
<body>
<h1>CSS 고급 구조 변환기</h1>
<textarea id="input" placeholder="여기에 CSS 붙여넣기"></textarea>
<br>
<button id="formatBtn">변환하기</button>
<button id="copyBtn">복사</button>
<textarea id="output" placeholder="결과"></textarea>

<script>
const PROPERTY_ORDER = [
  // 1. Layout
  'display',
  'position',
  'top', 'right', 'bottom', 'left',
  'z-index',

  // 2. Flex / Grid
  'flex',
  'flex-grow', 'flex-shrink', 'flex-basis',
  'flex-direction', 'flex-wrap',
  'justify-content', 'align-items', 'align-content',
  'gap',

  'grid',
  'grid-template-columns', 'grid-template-rows',

  // 3. Size
  'width', 'height',
  'min-width', 'max-width',
  'min-height', 'max-height',

  // 4. Margin (🔥 중요: shorthand → longhand)
  'margin',
  'margin-top', 'margin-right', 'margin-bottom', 'margin-left',

  // 5. Padding
  'padding',
  'padding-top', 'padding-right', 'padding-bottom', 'padding-left',

  // 6. Border
  'border',
  'border-width', 'border-style', 'border-color',
  'border-top', 'border-right', 'border-bottom', 'border-left',
  'border-radius',

  // 7. Background
  'background',
  'background-color',
  'background-image',
  'background-position',
  'background-size',
  'background-repeat',

  // 8. Typography
  'font',
  'font-size',
  'font-weight',
  'line-height',
  'text-align',
  'white-space',
  'color',

  // 9. Visual
  'box-shadow',
  'opacity',

  // 10. Interaction
  'transition',
  'transform',
  'animation'
];

function getPropertyName(prop) {
  return prop.split(':')[0].trim();
}

function sortProperties(props) {
  return props.sort((a, b) => {
    const nameA = getPropertyName(a);
    const nameB = getPropertyName(b);

    // 변수는 항상 마지막
    if (nameA.startsWith('--')) return 1;
    if (nameB.startsWith('--')) return -1;

    const idxA = PROPERTY_ORDER.indexOf(nameA);
    const idxB = PROPERTY_ORDER.indexOf(nameB);

    const pa = idxA === -1 ? 998 : idxA;
    const pb = idxB === -1 ? 998 : idxB;

    if (pa === pb) {
      // 같은 그룹이면 shorthand 먼저
      if (nameA.length !== nameB.length) {
        return nameA.length - nameB.length;
      }
      return a.localeCompare(b);
    }

    return pa - pb;
  });
}

function formatBlock(selector, content) {
  const props = content
  .split(';')
  .map(p => p.trim())
  .filter(Boolean)
  .map(p => {
    const [key, value] = p.split(':');
    if (!value) return p;
    return key.trim() + ':' + value.trim(); // 공백 제거
  });

  const isVarBlock = props.every(p => p.startsWith('--'));

  // 변수 블록: 세로 유지 (안전한 방식)
  if (isVarBlock) {
    return selector + ' {\n' +
      props.map(p => '  ' + p + ';').join('\n') +
      '\n}';
  }

  const sorted = sortProperties(props);

  return selector + ' {' + sorted.join('; ') + ';}';
}

function formatCssAdvanced(css) {
  const comments = [];
  css = css.replace(/\/\*[\s\S]*?\*\//g, (match) => {
    comments.push(match);
    return `__COMMENT_${comments.length - 1}__`;
  });

  let output = '';
  let buffer = '';
  let selector = '';
  let inMedia = false;

  const lines = css.split('\n');

  for (let line of lines) {
    const trimmed = line.trim();

    // 주석
    if (trimmed.startsWith('__COMMENT_')) {
      output += trimmed + '\n';
      continue;
    }

    // 한 줄 블록
    if (trimmed.includes('{') && trimmed.includes('}')) {
      const [sel, rest] = trimmed.split('{');
      const content = rest.replace('}', '').trim();

      output += formatBlock(sel.trim(), content) + '\n';
      continue;
    }

    // media
    if (trimmed.startsWith('@media')) {
      output += trimmed + '\n';
      inMedia = true;
      continue;
    }

    // 일반 블록 시작
    if (trimmed.includes('{')) {
      const parts = trimmed.split('{');
      selector = parts[0].trim();
      buffer = parts[1] ? parts[1].trim() : '';
      continue;
    }

    // 블록 종료
    if (trimmed.includes('}')) {
      if (buffer && selector) {
        output += (inMedia ? '  ' : '') + formatBlock(selector, buffer) + '\n';
      }

      selector = '';
      buffer = '';

      if (inMedia && trimmed === '}') {
        output += '}\n';
        inMedia = false;
      }

      continue;
    }

    // 내용 누적
    if (selector) {
      buffer += ' ' + trimmed;
    }
  }

  output = output.replace(/\n{2,}/g, '\n').trim();

  // 주석 복원
  output = output.replace(/__COMMENT_(\d+)__/g, (_, i) => comments[i]);
  
  // 주석 앞 공백 (이미 있으면 유지, 없으면 1줄 추가)
  output = output.replace(/([^\n])\n(\/\*[\s\S]*?\*\/)/g, (match, prev, comment, offset, str) => {
    // 이미 2줄 이상 공백인지 확인
    const before = str.slice(0, offset);
    const lastTwo = before.slice(-2);

    if (lastTwo === '\n\n') {
      return match; // 이미 공백 있음 → 유지
    }

    return prev + '\n\n' + comment;
  });

  // 과도한 개행 방지
  output = output.replace(/\n{3,}/g, '\n\n');
  
  return output;
}

document.getElementById('formatBtn').addEventListener('click', () => {
  const input = document.getElementById('input').value;
  document.getElementById('output').value = formatCssAdvanced(input);
});

document.getElementById('copyBtn').addEventListener('click', () => {
  const output = document.getElementById('output');
  output.select();
  document.execCommand('copy');
  alert('복사되었습니다');
});
</script>
</body>
</html>
